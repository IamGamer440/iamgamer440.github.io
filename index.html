<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAmGamer440 | Gamer Hub 2.0</title>
    <style>
        /* --- Animations --- */
        @keyframes rgbFlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes sniperGlow { 0% { box-shadow: 0 0 5px #ff4c4c; border-color: #ff4c4c; } 50% { box-shadow: 0 0 20px #ff4c4c; border-color: #fff; } 100% { box-shadow: 0 0 5px #ff4c4c; border-color: #ff4c4c; } }
        @keyframes comingSoonPulse { 0% { box-shadow: 0 0 0px #ff4c4c; opacity: 0.6; } 50% { box-shadow: 0 0 20px #ff4c4c; opacity: 1; border-color: #fff; } 100% { box-shadow: 0 0 0px #ff4c4c; opacity: 0.6; } }
        @keyframes welcomeVortex { 0% { transform: scale(1) rotate(0deg); opacity: 1; } 100% { transform: scale(8) rotate(20deg); opacity: 0; } }
        @keyframes neonFlicker { 0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc, 0 0 30px #00ffcc, 0 0 40px #33ff00; } 20%, 24%, 55% { text-shadow: 0 0 5px #00ffcc; } }
        
        /* Flying Entrance Animations */
        @keyframes flyInTop { from { transform: translateY(-500px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes flyInBottom { from { transform: translateY(500px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes flyInLeft { from { transform: translateX(-1000px) rotate(-20deg); opacity: 0; } to { transform: translateX(0) rotate(0); opacity: 1; } }
        @keyframes flyInRight { from { transform: translateX(1000px) rotate(20deg); opacity: 0; } to { transform: translateX(0) rotate(0); opacity: 1; } }

        @keyframes blink { 50% { border-color: #00ffcc } }

        /* SCANLINE ANIMATION */
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        body { 
            background: #020617 url('bg.jpg') no-repeat center center fixed; 
            background-size: cover; color: white; font-family: 'Poppins', sans-serif; 
            margin: 0; overflow-x: hidden; cursor: none;
        }

        /* --- RED DOUBLE SQUARE SNIPER CURSOR --- */
        #cursor-follower { position: fixed; width: 32px; height: 32px; border: 1.5px solid #ff4c4c; border-radius: 4px; pointer-events: none; z-index: 99999; transform: translate(-50%, -50%) rotate(45deg); transition: 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275); animation: sniperGlow 1.5s infinite; }
        #cursor-main { position: fixed; width: 10px; height: 10px; border: 2px solid #ff4c4c; background: rgba(255, 76, 76, 0.3); border-radius: 2px; pointer-events: none; z-index: 100000; transform: translate(-50%, -50%) rotate(45deg); box-shadow: 0 0 10px #ff4c4c; }

        /* --- Welcome Screen - VORTEX EFFECT --- */
        #welcome-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('welcome-bg.jpg') no-repeat center center; 
            background-size: cover; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 9999; text-align: center;
        }
        .welcome-vortex { animation: welcomeVortex 1s cubic-bezier(0.77, 0, 0.175, 1) forwards; pointer-events: none; }
        
        .intro-top { font-size: clamp(20px, 5vw, 35px); font-weight: 900; color: #fff; letter-spacing: 5px; margin-bottom: 5px; text-shadow: 0 0 15px #ff4c4c; }
        .welcome-title { font-size: clamp(50px, 15vw, 110px); font-weight: 900; background: linear-gradient(-45deg, #fff, #00ffcc, #33ff00, #fff); background-size: 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: rgbFlow 4s linear infinite; letter-spacing: -4px; margin-bottom: 5px; }
        .intro-bottom { font-size: clamp(10px, 3vw, 18px); font-weight: bold; color: #00ffcc; letter-spacing: 3px; margin-bottom: 40px; background: rgba(0,255,204,0.1); padding: 5px 20px; border-radius: 50px; border: 1px solid rgba(0,255,204,0.3); }
        
        .welcome-btn { padding: 18px 60px; font-size: 20px; font-weight: bold; background: rgba(0, 255, 204, 0.1); color: #00ffcc; border: 2px solid #00ffcc; border-radius: 50px; cursor: none; transition: 0.3s; }
        .welcome-btn:hover { background: #00ffcc; color: black; box-shadow: 0 0 40px #33ff00; }

        /* --- Main Site --- */
        #main-site { display: none; padding-top: 50px; opacity: 0; }
        .main-show { display: block !important; opacity: 1 !important; transition: 1s; }
        .container { max-width: 1200px; margin: auto; padding: 0 20px; text-align: center; }

        /* Flying Classes */
        .header-fly { animation: flyInTop 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .search-fly { animation: flyInRight 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.2s forwards; opacity: 0; }
        .tabs-fly { animation: flyInLeft 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.4s forwards; opacity: 0; }
        .card-fly { animation: flyInBottom 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; opacity: 0; }

        .animated-header { font-size: clamp(35px, 8vw, 65px); font-weight: 900; background: linear-gradient(-45deg, #fff, #00ffcc, #33ff00, #fff); background-size: 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: rgbFlow 4s ease infinite; margin-bottom: 5px; }
        
        .subtitle { 
            color: #00ffcc; 
            font-size: 14px; 
            letter-spacing: 3px; 
            font-weight: bold; 
            margin: 0 auto 20px; 
            min-height: 20px;
            animation: flyInTop 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .subtitle-text {
            border-right: 2px solid #00ffcc;
            animation: blink .75s step-end infinite, neonFlicker 3s infinite;
            display: inline-block;
            overflow: hidden;
            white-space: nowrap;
        }

        /* --- CENTERED SEARCH BOX --- */
        .search-container { margin: 0 auto 40px; width: 100%; max-width: 550px; }
        #searchBox { width: 100%; padding: 15px 30px; border: 2px solid rgba(0, 255, 204, 0.6); background: rgba(10, 15, 26, 0.85); backdrop-filter: blur(15px); color: white; border-radius: 50px; outline: none; cursor: none; font-size: 15px; transition: 0.4s; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        #searchBox:focus { border-color: #00ffcc; box-shadow: 0 0 30px rgba(0, 255, 204, 0.4); transform: scale(1.02); }

        /* --- BRIGHT & CLEAR TABS --- */
        .tabs { margin-bottom: 50px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .tab-btn { background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255, 255, 255, 0.5); color: #fff; padding: 12px 25px; border-radius: 50px; cursor: none; transition: 0.3s; font-size: 13px; font-weight: bold; text-transform: uppercase; backdrop-filter: blur(8px); }
        .tab-btn:hover { border-color: #00ffcc; color: #fff; background: rgba(0, 255, 204, 0.2); box-shadow: 0 0 15px rgba(0, 255, 204, 0.4); }
        .tab-btn.active { background: #00ffcc !important; color: black !important; border-color: #fff !important; box-shadow: 0 0 25px rgba(0, 255, 204, 0.7); }

        /* Game Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; perspective: 1000px; padding-bottom: 100px; }
        .card { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255, 255, 255, 0.15); border-top: 4px solid #00ffcc; padding: 35px; border-radius: 25px; text-align: left; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); backdrop-filter: blur(15px); }
        .card:hover { transform: scale(1.05) rotateX(5deg); border-top-color: #33ff00; box-shadow: 0 20px 60px rgba(0, 255, 204, 0.3); }
        .card h3 { color: #00ffcc; margin: 0 0 10px 0; font-size: 21px; }

        .dl-btn { display: block; background: linear-gradient(45deg, #00ffcc, #33ff00); color: black; text-align: center; padding: 14px; border-radius: 12px; text-decoration: none; font-weight: 800; font-size: 14px; cursor: none; transition: 0.3s; }
        .dl-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0, 255, 204, 0.4); filter: brightness(1.1); }

        /* --- HIGHLIGHTED COMING SOON --- */
        .coming-soon-badge { color: #ff4c4c; font-size: 13px; font-weight: bold; border: 2px solid #ff4c4c; padding: 12px; text-align: center; border-radius: 12px; margin-top: 25px; animation: comingSoonPulse 2s infinite; text-transform: uppercase; letter-spacing: 1px; background: rgba(255, 76, 76, 0.15); }

        /* Music Button */
        .music-btn { position: fixed; bottom: 25px; right: 25px; background: rgba(10, 15, 26, 0.85); border: 2px solid #ff4c4c; color: #ff4c4c; padding: 10px 22px; border-radius: 50px; cursor: none; z-index: 10001; font-weight: bold; backdrop-filter: blur(10px); transition: 0.3s; }
        .music-btn:hover { background: #ff4c4c; color: #fff; }

        /* TOXIC GREEN GLASS BUTTON */
        .insta-link { 
            display: inline-block; 
            padding: 18px 55px; 
            
            /* Glassmorphism Effect */
            background: rgba(0, 255, 65, 0.1);
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            
            color: #00ff41;
            text-decoration: none; 
            font-weight: 900; 
            font-size: 16px;
            letter-spacing: 4px;
            text-transform: uppercase;
            border-radius: 4px; 
            
            transition: all 0.4s ease; 
            cursor: none; 
            border: 1px solid rgba(0, 255, 65, 0.5);
            position: relative;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            text-shadow: 0 0 10px #00ff41;
            margin-top: 40px;
        }

        /* Hover Effect: Glow & Background Shift */
        .insta-link:hover { 
            background: rgba(0, 255, 65, 0.25);
            border: 1px solid #00ff41;
            color: #fff;
            transform: scale(1.08) translateY(-3px);
            box-shadow: 0 0 25px rgba(0, 255, 65, 0.6), 
                        inset 0 0 15px rgba(0, 255, 65, 0.3);
            text-shadow: 0 0 20px #fff;
        }

        /* Scanline animation */
        .insta-link::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: #00ff41;
            opacity: 0.5;
            animation: scan 2s linear infinite;
        }
    </style>
</head>
<body>

    <div id="cursor-follower"></div>
    <div id="cursor-main"></div>

    <div id="welcome-screen">
        <div class="intro-top">WELCOME GAMER</div>
        <div class="welcome-title">IAMGAMER440</div>
        <div class="intro-bottom">OFFICIAL GAME FIXES & FOLDERS 2026</div>
        <button class="welcome-btn" onclick="openSite()">ENTER THE HUB 🎮</button>
    </div>

    <div id="main-site">
        <div class="container">
            <div class="animated-header header-fly">@iamgamer440</div>
            <div class="subtitle">
                <span class="subtitle-text" id="typingText"></span>
            </div>
            
            <div class="search-container search-fly">
                <input type="text" id="searchBox" placeholder="SEARCH FOR A GAME FIX..." oninput="updateList()">
            </div>

            <div class="tabs tabs-fly">
                <button class="tab-btn active" id="btn-all" onclick="setCat('all')">📂 All Library</button>
                <button class="tab-btn" id="btn-Hitman" onclick="setCat('Hitman')">🎯 Hitman Files</button>
                <button class="tab-btn" id="btn-AC" onclick="setCat('AC')">⚔️ AC Archive</button>
                <button class="tab-btn" id="btn-Others" onclick="setCat('Others')">📦 Other Data</button>
            </div>

            <div id="gameList" class="grid"></div>

            <div style="margin-top: 50px; padding-bottom: 50px; text-align: center;">
                <a href="https://www.instagram.com/iamgamer.440/" target="_blank" class="insta-link">[ CONNECT ON INSTA ]</a>
            </div>
        </div>
    </div>

    <audio id="myAudio" loop><source src="music.mp3" type="audio/mpeg"></audio>
    <button class="music-btn" onclick="toggleM()">🎵 MUSIC: ON/OFF</button>

    <script>
        const follower = document.getElementById('cursor-follower');
        const main = document.getElementById('cursor-main');
        document.addEventListener('mousemove', (e) => {
            main.style.left = e.clientX + 'px'; main.style.top = e.clientY + 'px';
            setTimeout(() => { follower.style.left = e.clientX + 'px'; follower.style.top = e.clientY + 'px'; }, 60);
        });

        const games = [
            { n: "🎯 Hitman 2 Silent Assassin", c: "Hitman", d: "Unlock all missions & 4K resolution patch authorized.", l: "https://drive.google.com/file/d/1WbyWQR32W6WpH34hX6PAeLb2fvcc36km/view?usp=drive_link", comingSoon: false },
            { n: "🎯 Hitman Absolution Fix", c: "Hitman", d: "Startup crash sequence & lag stutter optimization.", l: "#", comingSoon: true },
            { n: "🎯 Hitman World of Assassins", c: "Hitman", d: "Online handshake & server stability patch v2.6.", l: "#", comingSoon: true },
            { n: "⚔️ Assassin's Creed 1 Fix", c: "AC", d: "Legacy CPU crash fix & frame-rate stabilization.", l: "#", comingSoon: true },
            { n: "⚔️ Assassin's Creed 2 Fix", c: "AC", d: "Launcher bypass & HID controller support authorized.", l: "#", comingSoon: true },
            { n: "🛹 Session Skate Sim Fix", c: "Others", d: "Input recognition & advanced lag reduction fix.", l: "https://drive.google.com/file/d/1xG81nf80QBZ3J9CXLWYVG386bSYiAUxq/view?usp=drive_link", comingSoon: false },
            { n: "👾 Little Fighter 4 Turbo", c: "Others", d: "Full-screen display buffer crash repair.", l: "https://drive.google.com/file/d/1b67f9QpMqC1Bjj-YWQFy-yeCEu60k4-E/view?usp=drive_link", comingSoon: false }
        ];

        // TYPING ANIMATION - JAVASCRIPT SE CONTROL
        function typeText() {
            const text = "OFFICIAL GAME FIXES & FOLDERS 2026...";
            const element = document.getElementById('typingText');
            let index = 0;
            element.textContent = "";
            
            const interval = setInterval(() => {
                if (index < text.length) {
                    element.textContent += text.charAt(index);
                    index++;
                } else {
                    clearInterval(interval);
                }
            }, 100);
        }

        function openSite() {
            document.getElementById('welcome-screen').classList.add('welcome-vortex');
            document.getElementById('myAudio').play().catch(() => {});
            
            setTimeout(() => { 
                document.getElementById('welcome-screen').style.display = 'none'; 
                document.getElementById('main-site').classList.add('main-show');
                
                // TYPING START KARO FLYING COMPLETE HONE KE BAAD
                setTimeout(() => {
                    typeText();
                    updateList();
                }, 1000);
            }, 800); 
        }

        function setCat(cat) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + (cat === 'all' ? 'all' : cat)).classList.add('active');
            updateList(cat);
        }

        function updateList(cat = 'all') {
            const query = document.getElementById('searchBox').value.toLowerCase();
            const list = document.getElementById('gameList');
            list.innerHTML = "";
            games.filter(g => (cat === 'all' || g.c === cat) && g.n.toLowerCase().includes(query))
            .forEach((g, i) => {
                const card = document.createElement('div');
                card.className = 'card card-fly';
                card.style.animationDelay = (0.6 + (i * 0.1)) + 's';
                const action = g.comingSoon 
                    ? `<div class="coming-soon-badge">⏳ Coming Soon</div>` 
                    : `<a href="${g.l}" target="_blank" class="dl-btn">DOWNLOAD FIX</a>`;
                
                card.innerHTML = `<h3>${g.n}</h3><p style="color:#94a3b8; font-size:13px;">${g.d}</p>${action}`;
                list.appendChild(card);
            });
        }

        function toggleM() {
            const a = document.getElementById('myAudio');
            if(a.paused) a.play(); else a.pause();
        }
    </script>
</body>
</html>
